<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Name Pada HTML</title>
    <style>
      h1 {
        color: hsl(195, 71%, 43%);
      }
      h2 {
        color: rgb(235, 229, 59);
      }
      p {
        color: #3e65a3;
      }
    </style>
  </head>
  <body>
    <h1>Color Name Pada HTML</h1>
    <!-- Kode : Color Name -->
    <h2>kode : color name</h2>
    <hr />
    <h1>Title</h1>
    <h2>Subtitle</h2>
    <p>This is a paragraph with a specific color.</p>
  </body>
</html>
